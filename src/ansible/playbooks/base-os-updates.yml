---
- name: Install Base OS Updates
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tasks:
    - name: Assert Debian package management is available
      ansible.builtin.assert:
        that:
          - ansible_pkg_mgr == 'apt'
        fail_msg: "This playbook expects a Debian host using apt."

    - name: Upgrade Debian packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true

    - name: Check whether reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot when updates require it
      when: reboot_required.stat.exists | default(false)
      ansible.builtin.reboot:
        msg: Rebooting after base OS updates
        reboot_timeout: 1800
